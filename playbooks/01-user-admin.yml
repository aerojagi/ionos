- name: Ensure ansible admin user exists (idempotent)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    admin_email: "{{ admin_email }}"
    admin_firstname: "Ansible"
    admin_lastname: "Admin"

  tasks:
    - name: Lookup user by email via filter
      ionoscloudsdk.ionoscloud.user_info:
        depth: 1
        filters:
          email: "{{ admin_email }}"
      register: user_lookup

    - name: Set exists flag
      set_fact:
        admin_exists: "{{ (user_lookup.users | default([]) | length) > 0 }}"

    - name: Create user only when missing
      ionoscloudsdk.ionoscloud.user:
        firstname: "{{ admin_firstname }}"
        lastname: "{{ admin_lastname }}"
        email: "{{ admin_email }}"
        user_password: "{{ ionos_ansible_admin_password }}"
        administrator: true
        state: present
      when: not admin_exists
