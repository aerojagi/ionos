---
- name: Create a small IONOS VDC and Ubuntu vCPU VM for SSH
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vdc_name: "lab-vdc-01"
    vdc_location: "de/fra"          # change if you want de/txl, de/fkb, gb/lhr, etc.
    lan_name: "public-lan"
    vm_name: "ubuntu-small-01"

    vm_cores: 1
    vm_ram_mb: 2048
    vm_disk_gb: 20
    vm_disk_type: "HDD"             # cheapest/default; change to SSD Standard if you prefer
    vm_image: "ubuntu:latest"       # convenient alias; pin an image ID later for reproducibility

    ssh_public_key_path: "{{ lookup('ansible.builtin.env', 'HOME') + '/.ssh/id_ed25519.pub' }}"
    ssh_allowed_source_cidr: "95.91.212.19/32"   # safer: replace with your public IP/CIDR, e.g. 203.0.113.10/32

  tasks:
    - name: Validate SSH public key file exists
      ansible.builtin.stat:
        path: "{{ ssh_public_key_path }}"
      register: ssh_pubkey_file

    - name: Fail when SSH public key file is missing
      ansible.builtin.assert:
        that:
          - ssh_pubkey_file.stat.exists
          - ssh_pubkey_file.stat.isreg
        fail_msg: "SSH public key file not found: {{ ssh_public_key_path }}"

    - name: Read SSH public key
      ansible.builtin.set_fact:
        ssh_public_key_content: "{{ lookup('ansible.builtin.file', ssh_public_key_path) | trim }}"

    - name: Validate requested VM sizing
      ansible.builtin.assert:
        that:
          - vm_cores | int >= 1
          - vm_ram_mb | int >= 256
          - (vm_ram_mb | int) % 256 == 0
          - vm_disk_gb | int >= 10
          - ssh_public_key_content | length > 0
        fail_msg: "Invalid VM sizing or empty SSH public key."

    - name: Ensure VDC exists
      ionoscloudsdk.ionoscloud.datacenter:
        name: "{{ vdc_name }}"
        location: "{{ vdc_location }}"
        description: "Ansible-managed VDC for a small Ubuntu SSH VM"
        wait: true
        wait_timeout: 900
        state: present
      register: vdc_result

    - name: Ensure public LAN exists
      ionoscloudsdk.ionoscloud.lan:
        datacenter: "{{ vdc_name }}"
        name: "{{ lan_name }}"
        public: true
        wait: true
        wait_timeout: 900
        state: present
      register: lan_result

    - name: Ensure Ubuntu vCPU server exists
      ionoscloudsdk.ionoscloud.vcpu_server:
        datacenter: "{{ vdc_name }}"
        name: "{{ vm_name }}"
        cores: "{{ vm_cores }}"
        ram: "{{ vm_ram_mb }}"
        volume_size: "{{ vm_disk_gb }}"
        disk_type: "{{ vm_disk_type }}"
        image: "{{ vm_image }}"
        lan: "{{ lan_name }}"
        assign_public_ip: true
        ssh_keys:
          - "{{ ssh_public_key_content }}"
        availability_zone: "AUTO"
        wait: true
        wait_timeout: 1800
        state: present
      register: vm_result

    - name: Get NICs for the VM
      ionoscloudsdk.ionoscloud.nic_info:
        datacenter: "{{ vdc_name }}"
        server: "{{ vm_name }}"
      register: nic_info_result

    - name: Fail if no NIC was found on the VM
      ansible.builtin.assert:
        that:
          - nic_info_result.nics is defined
          - nic_info_result.nics | length > 0
        fail_msg: "No NIC found for server {{ vm_name }}"

    - name: Pick the first NIC
      ansible.builtin.set_fact:
        vm_nic_id: "{{ nic_info_result.nics[0].id }}"

    - name: Ensure NIC firewall is active and DHCP is enabled
      ionoscloudsdk.ionoscloud.nic:
        datacenter: "{{ vdc_name }}"
        server: "{{ vm_name }}"
        nic: "{{ vm_nic_id }}"
        dhcp: true
        firewall_active: true
        wait: true
        wait_timeout: 900
        state: update
      register: nic_update_result

    - name: Ensure SSH firewall rule exists
      ionoscloudsdk.ionoscloud.firewall_rule:
        datacenter: "{{ vdc_name }}"
        server: "{{ vm_name }}"
        nic: "{{ vm_nic_id }}"
        name: "Allow SSH"
        protocol: "TCP"
        port_range_start: 22
        port_range_end: 22
        source_ip: "{{ ssh_allowed_source_cidr }}"
        wait: true
        wait_timeout: 900
        state: present
      register: ssh_fw_result

    - name: Refresh NIC data after firewall setup
      ionoscloudsdk.ionoscloud.nic_info:
        datacenter: "{{ vdc_name }}"
        server: "{{ vm_name }}"
      register: nic_info_after

    - name: Show connection hints
      ansible.builtin.debug:
        msg:
          - "VDC: {{ vdc_name }}"
          - "VM: {{ vm_name }}"
          - "NIC ID: {{ vm_nic_id }}"
          - "IPv4 addresses: {{ nic_info_after.nics[0].properties.ips | default([]) }}"
          - "SSH source CIDR allowed: {{ ssh_allowed_source_cidr }}"
          - "Use your image-default login user with your private key to connect."
